# 测试模板库

## UI 测试模板

### 登录测试模板 (login.yaml)
```yaml
name: "登录功能测试"
type: "ui"
framework: "playwright"
steps:
- action: "navigate"
  selector: "{{ login_url }}"
  description: "导航到登录页面"
- action: "fill"
  selector: "{{ username_field }}"
  value: "{{ username }}"
  description: "填写用户名"
- action: "fill"
  selector: "{{ password_field }}"
  value: "{{ password }}"
  description: "填写密码"
- action: "click"
  selector: "{{ login_button }}"
  description: "点击登录按钮"
- action: "verify"
  selector: "{{ success_indicator }}"
  description: "验证登录成功"
expected_results:
- condition: "url_change"
  value: "{{ dashboard_url }}"
  description: "URL应变更为仪表板页面"
- condition: "element_visible"
  selector: "{{ welcome_message }}"
  description: "欢迎消息应可见"
priority: "high"
tags:
- "authentication"
- "critical-path"
```

### 表单验证测试模板 (form_validation.yaml)
```yaml
name: "表单验证测试"
type: "ui"
framework: "playwright"
steps:
- action: "fill"
  selector: "{{ email_field }}"
  value: "{{ invalid_email }}"
  description: "输入无效邮箱地址"
- action: "blur"
  selector: "{{ email_field }}"
  description: "使邮箱字段失去焦点"
- action: "verify"
  selector: "{{ error_message }}"
  description: "验证错误消息显示"
expected_results:
- condition: "text_match"
  selector: "{{ error_message }}"
  value: "{{ expected_error_text }}"
  description: "错误消息应匹配预期文本"
- condition: "element_visible"
  selector: "{{ error_message }}"
  description: "错误消息应可见"
priority: "medium"
tags:
- "validation"
- "error-handling"
```

### 导航测试模板 (navigation.yaml)
```yaml
name: "导航测试"
type: "ui"
framework: "playwright"
steps:
- action: "click"
  selector: "{{ menu_item }}"
  description: "点击菜单项"
- action: "wait_for_load"
  selector: "{{ page_content }}"
  description: "等待页面内容加载"
- action: "verify"
  selector: "{{ page_title }}"
  description: "验证页面标题"
expected_results:
- condition: "url_contains"
  value: "{{ expected_url_part }}"
  description: "URL应包含预期部分"
- condition: "element_visible"
  selector: "{{ page_content }}"
  description: "页面内容应可见"
priority: "low"
tags:
- "navigation"
- "ux"
```

## API 测试模板

### CRUD 操作测试模板 (crud_operations.yaml)
```yaml
name: "CRUD操作测试"
type: "api"
framework: "pytest"
endpoint: "{{ base_url }}/{{ resource_path }}"
methods:
  create:
    method: "POST"
    payload: "{{ create_payload }}"
    expected_status: 201
  read:
    method: "GET"
    expected_status: 200
  update:
    method: "PUT"
    payload: "{{ update_payload }}"
    expected_status: 200
  delete:
    method: "DELETE"
    expected_status: 204
expected_headers:
  "Content-Type": "application/json"
priority: "high"
tags:
- "api"
- "data-integrity"
```

### 认证测试模板 (authentication.yaml)
```yaml
name: "认证测试"
type: "api"
framework: "pytest"
endpoint: "{{ auth_url }}"
scenarios:
  valid_credentials:
    method: "POST"
    payload: "{{ valid_auth_payload }}"
    expected_status: 200
    expected_response_fields:
      - "token"
      - "user_id"
  invalid_credentials:
    method: "POST"
    payload: "{{ invalid_auth_payload }}"
    expected_status: 401
  missing_credentials:
    method: "POST"
    payload: {}
    expected_status: 400
priority: "high"
tags:
- "security"
- "authentication"
```

## 单元测试模板

### 业务逻辑测试模板 (business_logic.yaml)
```yaml
name: "业务逻辑测试"
type: "unit"
framework: "pytest"
module: "{{ module_name }}"
functions:
  - name: "{{ function_name }}"
    inputs:
      - args: "{{ sample_args }}"
        kwargs: "{{ sample_kwargs }}"
        expected_output: "{{ expected_result }}"
      - args: "{{ edge_case_args }}"
        kwargs: "{{ edge_case_kwargs }}"
        expected_output: "{{ edge_case_result }}"
exceptions:
  - exception_type: "{{ expected_exception }}"
    args: "{{ error_case_args }}"
    description: "预期在此情况下抛出异常"
priority: "medium"
tags:
- "business-logic"
- "validation"
```

### 边界条件测试模板 (edge_cases.yaml)
```yaml
name: "边界条件测试"
type: "unit"
framework: "pytest"
module: "{{ module_name }}"
test_cases:
  - name: "最小值测试"
    input: "{{ min_value }}"
    expected: "{{ expected_min_behavior }}"
    description: "测试函数在最小允许值的行为"
  - name: "最大值测试"
    input: "{{ max_value }}"
    expected: "{{ expected_max_behavior }}"
    description: "测试函数在最大允许值的行为"
  - name: "零值测试"
    input: 0
    expected: "{{ expected_zero_behavior }}"
    description: "测试函数在零值输入的行为"
  - name: "空值测试"
    input: null
    expected: "{{ expected_null_behavior }}"
    description: "测试函数在空值输入的行为"
priority: "high"
tags:
- "edge-cases"
- "robustness"
```